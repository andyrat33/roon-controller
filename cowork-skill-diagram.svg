<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="520" fill="#0f0f13" rx="16"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="1"/>
    </pattern>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="roonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="zoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="url(#grid)" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#f8fafc" font-size="17" font-weight="700" letter-spacing="0.5">Natural Language Roon Control via Claude Cowork</text>

  <!-- ===== COLUMN 1: User / Cowork ===== -->
  <!-- User bubble -->
  <rect x="30" y="68" width="200" height="130" rx="12" fill="#1e1e2e" stroke="#d97706" stroke-width="1.5"/>
  <rect x="30" y="68" width="200" height="32" rx="12" fill="url(#claudeGrad)"/>
  <rect x="30" y="88" width="200" height="12" fill="url(#claudeGrad)"/>
  <text x="130" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">YOU SAY</text>

  <!-- Chat bubbles -->
  <rect x="46" y="108" width="168" height="24" rx="10" fill="#2d2d3e"/>
  <text x="130" y="124" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="500">"Play 10 songs from 1988"</text>

  <rect x="46" y="138" width="168" height="24" rx="10" fill="#2d2d3e"/>
  <text x="130" y="154" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="500">"Queue 3 Dire Straits classics"</text>

  <rect x="46" y="168" width="168" height="24" rx="10" fill="#2d2d3e"/>
  <text x="130" y="184" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="500">"Turn volume up in the kitchen"</text>

  <!-- Cowork / Claude box -->
  <rect x="30" y="218" width="200" height="116" rx="12" fill="#1e1e2e" stroke="#d97706" stroke-width="1.5"/>
  <rect x="30" y="218" width="200" height="32" rx="12" fill="url(#claudeGrad)"/>
  <rect x="30" y="238" width="200" height="12" fill="url(#claudeGrad)"/>
  <text x="130" y="239" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">CLAUDE + COWORK SKILL</text>

  <!-- Cowork skill detail -->
  <text x="46" y="267" fill="#94a3b8" font-size="10">Reads SKILL.md to know:</text>
  <text x="46" y="283" fill="#fcd34d" font-size="10">  - Your zone IDs</text>
  <text x="46" y="297" fill="#fcd34d" font-size="10">  - Your taste profile</text>
  <text x="46" y="311" fill="#fcd34d" font-size="10">  - API patterns + action strings</text>

  <!-- Label: Mac -->
  <rect x="30" y="345" width="200" height="20" rx="6" fill="#1e1e2e" stroke="#374151" stroke-width="1"/>
  <text x="130" y="358" text-anchor="middle" fill="#6b7280" font-size="10">Your Mac</text>


  <!-- ===== ARROW 1: Cowork → API ===== -->
  <line x1="230" y1="276" x2="295" y2="276" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>
  <text x="263" y="268" text-anchor="middle" fill="#60a5fa" font-size="9">HTTP POST</text>
  <text x="263" y="286" text-anchor="middle" fill="#60a5fa" font-size="9">port 3001</text>

  <!-- ===== COLUMN 2: Docker / REST API ===== -->
  <rect x="300" y="68" width="200" height="300" rx="12" fill="#1e1e2e" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="300" y="68" width="200" height="32" rx="12" fill="url(#apiGrad)"/>
  <rect x="300" y="88" width="200" height="12" fill="url(#apiGrad)"/>
  <text x="400" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">DOCKER  |  REST API</text>

  <!-- API endpoints -->
  <text x="316" y="116" fill="#94a3b8" font-size="10">Endpoints:</text>

  <rect x="316" y="122" width="168" height="20" rx="5" fill="#0f172a"/>
  <text x="326" y="136" fill="#34d399" font-size="10" font-family="monospace">POST /api/find-and-play</text>

  <rect x="316" y="146" width="168" height="20" rx="5" fill="#0f172a"/>
  <text x="326" y="160" fill="#34d399" font-size="10" font-family="monospace">POST /api/playlist</text>

  <rect x="316" y="170" width="168" height="20" rx="5" fill="#0f172a"/>
  <text x="326" y="184" fill="#34d399" font-size="10" font-family="monospace">POST /api/transport</text>

  <rect x="316" y="194" width="168" height="20" rx="5" fill="#0f172a"/>
  <text x="326" y="208" fill="#34d399" font-size="10" font-family="monospace">POST /api/volume</text>

  <rect x="316" y="218" width="168" height="20" rx="5" fill="#0f172a"/>
  <text x="326" y="232" fill="#34d399" font-size="10" font-family="monospace">POST /api/shuffle</text>

  <!-- Divider -->
  <line x1="316" y1="248" x2="484" y2="248" stroke="#1e3a5f" stroke-width="1"/>
  <text x="316" y="262" fill="#94a3b8" font-size="10">Browse session logic:</text>
  <text x="316" y="278" fill="#64748b" font-size="9">search → category → track</text>
  <text x="316" y="291" fill="#64748b" font-size="9">→ action (Play Now / Queue)</text>

  <!-- NAS label -->
  <rect x="300" y="345" width="200" height="20" rx="6" fill="#1e1e2e" stroke="#374151" stroke-width="1"/>
  <text x="400" y="358" text-anchor="middle" fill="#6b7280" font-size="10">QNAP NAS  |  Container Station</text>

  <!-- ===== ARROW 2: API → Roon ===== -->
  <line x1="500" y1="218" x2="565" y2="218" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)" stroke-dasharray="5,3"/>
  <text x="533" y="210" text-anchor="middle" fill="#a78bfa" font-size="9">Roon</text>
  <text x="533" y="228" text-anchor="middle" fill="#a78bfa" font-size="9">Extension API</text>

  <!-- ===== COLUMN 3: Roon Core ===== -->
  <rect x="570" y="68" width="200" height="188" rx="12" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="570" y="68" width="200" height="32" rx="12" fill="url(#roonGrad)"/>
  <rect x="570" y="88" width="200" height="12" fill="url(#roonGrad)"/>
  <text x="670" y="89" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">ROON CORE</text>

  <text x="586" y="116" fill="#94a3b8" font-size="10">Library + TIDAL search</text>
  <text x="586" y="132" fill="#94a3b8" font-size="10">Zone management</text>
  <text x="586" y="148" fill="#94a3b8" font-size="10">Playback engine</text>

  <!-- Action labels -->
  <rect x="586" y="158" width="168" height="20" rx="5" fill="#2d1b69"/>
  <text x="670" y="172" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="monospace">"Play Now"  |  "Queue"</text>
  <rect x="586" y="182" width="168" height="20" rx="5" fill="#2d1b69"/>
  <text x="670" y="196" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="monospace">"Add Next"  |  "Start Radio"</text>

  <!-- QNAP label under Roon Core -->
  <rect x="570" y="270" width="200" height="20" rx="6" fill="#1e1e2e" stroke="#374151" stroke-width="1"/>
  <text x="670" y="283" text-anchor="middle" fill="#6b7280" font-size="10">QNAP NAS</text>

  <!-- ===== ARROW 3: Roon → Zones ===== -->
  <line x1="670" y1="256" x2="670" y2="305" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="680" y="286" fill="#34d399" font-size="9">audio</text>

  <!-- ===== ZONES ===== -->
  <rect x="570" y="308" width="200" height="168" rx="12" fill="#1e1e2e" stroke="#059669" stroke-width="1.5"/>
  <rect x="570" y="308" width="200" height="32" rx="12" fill="url(#zoneGrad)"/>
  <rect x="570" y="328" width="200" height="12" fill="url(#zoneGrad)"/>
  <text x="670" y="329" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">YOUR ZONES</text>

  <!-- Zone icons + names -->
  <!-- Speaker icon helper -->
  <text x="590" y="357" fill="#34d399" font-size="13">&#9654;</text>
  <text x="608" y="357" fill="#e2e8f0" font-size="11">Living Room</text>

  <text x="590" y="377" fill="#34d399" font-size="13">&#9654;</text>
  <text x="608" y="377" fill="#e2e8f0" font-size="11">Office</text>

  <text x="590" y="397" fill="#34d399" font-size="13">&#9654;</text>
  <text x="608" y="397" fill="#e2e8f0" font-size="11">Kitchen</text>

  <text x="590" y="417" fill="#34d399" font-size="13">&#9654;</text>
  <text x="608" y="417" fill="#e2e8f0" font-size="11">Family Room</text>

  <text x="590" y="437" fill="#34d399" font-size="13">&#9654;</text>
  <text x="608" y="437" fill="#e2e8f0" font-size="11">Hegel + more…</text>

  <!-- ===== BOTTOM FLOW SUMMARY ===== -->
  <rect x="30" y="390" width="470" height="100" rx="10" fill="#111827" stroke="#1f2937" stroke-width="1"/>
  <text x="265" y="412" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700" letter-spacing="0.5">EXAMPLE FLOW</text>

  <text x="50" y="432" fill="#6b7280" font-size="9">1.</text>
  <text x="62" y="432" fill="#fbbf24" font-size="9">"Play 10 songs from 1988 in the office"</text>

  <text x="50" y="450" fill="#6b7280" font-size="9">2.</text>
  <text x="62" y="450" fill="#94a3b8" font-size="9">Claude reads SKILL.md — knows office zone ID + your taste profile</text>

  <text x="50" y="468" fill="#6b7280" font-size="9">3.</text>
  <text x="62" y="468" fill="#94a3b8" font-size="9">Calls /api/find-and-play 10x via osascript curl, queuing each track</text>

  <text x="50" y="486" fill="#6b7280" font-size="9">4.</text>
  <text x="62" y="486" fill="#34d399" font-size="9">Roon plays your personalised 1988 mix — no app needed</text>

</svg>
