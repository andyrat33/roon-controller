version: "3.8"

services:
  roon-controller:
    image: roon-controller:latest
    # Build locally on QNAP, or push to a registry first
    build: .
    container_name: roon-controller
    restart: unless-stopped

    # HOST NETWORK is required so Roon's SOOD discovery (UDP multicast)
    # can find the Roon Core on your LAN.
    # This means the API will be available on the QNAP's own IP, port 3001.
    network_mode: host

    environment:
      - TZ=Europe/London
      - PORT=3001

    # Persist the Roon authorisation token so you don't re-authorise
    # every time the container restarts
    volumes:
      - roon_auth:/app/.roon
      # Mount extension.js from host so you can update it with just "docker restart"
      # (no rebuild needed after changes)
      - ./extension.js:/app/extension.js:ro

volumes:
  roon_auth:
